# DEMO CONFIG — NO versionar con spreadsheet_id de clientes reales.
# Para clientes: copiar a configs/cliente_NOMBRE.yaml y cambiar los IDs.
client:
  name: "Demo Agencia Marketing — Auditoría Digital"
  id: "demo_digital"

pipeline_type: "digital_audit"

scraper:
  source: "gmaps"

gmaps_scraper:
  search_queries:
    - "clínicas estéticas"
    - "dentistas"
    - "peluquerías y salones de belleza"
    - "talleres mecánicos"
    - "academias de idiomas"
  location: "Madrid"
  max_results_per_query: 25   # top_n para Firecrawl (los peores de Maps)
  language: "es"

enricher:
  model: "claude-haiku-4-5-20251001"
  batch_size: 5

delivery:
  google_sheets:
    enabled: true
    spreadsheet_id: "1iArOndMKEgR9KXJhsoZQKt1qWOEe7pVaoFW_YLl9i5k"
    worksheet_name: "Audit Digital"
